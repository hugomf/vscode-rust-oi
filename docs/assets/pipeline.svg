<svg xmlns="http://www.w3.org/2000/svg" width="700" viewBox="0 0 700 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b8fa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      :root { --bg: #ffffff; --bg2: #f6f8fa; --border: #d0d7de; --text: #1f2328; --text2: #656d76; --purple-fill: #f3f0ff; --purple-border: #7c3aed; --purple-text: #4c1d95; --teal-fill: #f0fdf4; --teal-border: #059669; --teal-text: #064e3b; --gray-fill: #f6f8fa; --gray-border: #d0d7de; --gray-text: #1f2328; }
      @media (prefers-color-scheme: dark) { :root { --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #e6edf3; --text2: #8b949e; --purple-fill: #1e1245; --purple-border: #a78bfa; --purple-text: #c4b5fd; --teal-fill: #022c22; --teal-border: #34d399; --teal-text: #6ee7b7; --gray-fill: #161b22; --gray-border: #30363d; --gray-text: #e6edf3; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="580" fill="var(--bg)" rx="8"/>

  <!-- Header -->
  <text x="350" y="32" text-anchor="middle" font-weight="600" font-size="15" fill="var(--text)">organizeImportsInText — pipeline</text>

  <!-- Stage 1: raw source -->
  <rect x="50" y="52" width="600" height="50" rx="6" fill="var(--gray-fill)" stroke="var(--gray-border)" stroke-width="1"/>
  <text x="220" y="81" font-weight="600" fill="var(--gray-text)">Raw Rust source</text>
  <text x="220" y="96" font-size="11" fill="var(--text2)">full file text — imports, comments, code body</text>

  <line x1="350" y1="102" x2="350" y2="122" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: parseImports -->
  <rect x="50" y="122" width="600" height="62" rx="6" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="70" y="147" font-weight="600" fill="var(--purple-text)">parseImports</text>
  <text x="70" y="163" font-size="11" fill="var(--purple-text)">stops at first non-import line · expands nested braces · captures cfg, aliases, pub use</text>
  <text x="598" y="147" text-anchor="end" font-size="11" fill="var(--text2)">→ ImportStatement[]</text>

  <line x1="350" y1="184" x2="350" y2="204" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: dedup -->
  <rect x="50" y="204" width="600" height="62" rx="6" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="70" y="229" font-weight="600" fill="var(--purple-text)">removeDuplicateImports</text>
  <text x="70" y="245" font-size="11" fill="var(--purple-text)">key: module::sorted-items · order-independent · aliases dedup on bare item name</text>
  <text x="598" y="229" text-anchor="end" font-size="11" fill="var(--text2)">→ ImportStatement[]</text>

  <line x1="350" y1="266" x2="350" y2="286" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: unused -->
  <rect x="50" y="286" width="600" height="62" rx="6" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="70" y="311" font-weight="600" fill="var(--purple-text)">removeUnusedImports</text>
  <text x="70" y="327" font-size="11" fill="var(--purple-text)">4-pass analysis · strips strings &amp; comments · wildcards and cfg always kept</text>
  <text x="598" y="311" text-anchor="end" font-size="11" fill="var(--text2)">→ ImportStatement[]</text>

  <line x1="350" y1="348" x2="350" y2="368" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: organize -->
  <rect x="50" y="368" width="600" height="62" rx="6" fill="var(--teal-fill)" stroke="var(--teal-border)" stroke-width="1"/>
  <text x="70" y="393" font-weight="600" fill="var(--teal-text)">organizeImports</text>
  <text x="70" y="409" font-size="11" fill="var(--teal-text)">categorize: std / external / local / cfg · modes: default, flat, preserve, custom</text>
  <text x="598" y="393" text-anchor="end" font-size="11" fill="var(--text2)">→ OrganizedImports</text>

  <line x1="350" y1="430" x2="350" y2="450" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6: buildOrganizedText -->
  <rect x="50" y="450" width="600" height="62" rx="6" fill="var(--teal-fill)" stroke="var(--teal-border)" stroke-width="1"/>
  <text x="70" y="475" font-weight="600" fill="var(--teal-text)">buildOrganizedText</text>
  <text x="70" y="491" font-size="11" fill="var(--teal-text)">slot-based replacement · comments &amp; blanks preserved verbatim · idempotent output</text>
  <text x="598" y="475" text-anchor="end" font-size="11" fill="var(--text2)">→ string</text>

  <!-- Legend -->
  <rect x="50" y="530" width="14" height="14" rx="3" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="70" y="542" font-size="11" fill="var(--text2)">cleaning stages</text>
  <rect x="180" y="530" width="14" height="14" rx="3" fill="var(--teal-fill)" stroke="var(--teal-border)" stroke-width="1"/>
  <text x="200" y="542" font-size="11" fill="var(--text2)">output stages</text>
  <rect x="310" y="530" width="14" height="14" rx="3" fill="var(--gray-fill)" stroke="var(--gray-border)" stroke-width="1"/>
  <text x="330" y="542" font-size="11" fill="var(--text2)">data</text>
</svg>
