<svg xmlns="http://www.w3.org/2000/svg" width="700" viewBox="0 0 700 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b8fa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-yes" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-no" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b8fa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-keep" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-drop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e05c3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      :root { --bg: #ffffff; --bg2: #f6f8fa; --border: #d0d7de; --text: #1f2328; --text2: #656d76; --q-fill: #f3f0ff; --q-border: #7c3aed; --q-text: #4c1d95; --keep-fill: #f0fdf4; --keep-border: #059669; --keep-text: #064e3b; --drop-fill: #fff1ee; --drop-border: #e05c3a; --drop-text: #7c2d12; --side-fill: #f6f8fa; --side-border: #d0d7de; --yes: #059669; --no: #656d76; }
      @media (prefers-color-scheme: dark) { :root { --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #e6edf3; --text2: #8b949e; --q-fill: #1e1245; --q-border: #a78bfa; --q-text: #c4b5fd; --keep-fill: #022c22; --keep-border: #34d399; --keep-text: #6ee7b7; --drop-fill: #2d1208; --drop-border: #fb923c; --drop-text: #fdba74; --side-fill: #161b22; --side-border: #30363d; --yes: #34d399; --no: #8b949e; } }
    </style>
  </defs>

  <rect width="700" height="600" fill="var(--bg)" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-weight="600" font-size="14" fill="var(--text)">removeUnusedImports — filter decision tree</text>

  <!-- Entry -->
  <rect x="220" y="44" width="260" height="36" rx="6" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
  <text x="350" y="66" text-anchor="middle" font-weight="600" fill="var(--text)">for each ImportStatement</text>

  <line x1="350" y1="80" x2="350" y2="100" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Q1: isWildcard -->
  <rect x="220" y="100" width="260" height="36" rx="6" fill="var(--q-fill)" stroke="var(--q-border)" stroke-width="1"/>
  <text x="350" y="122" text-anchor="middle" font-weight="600" fill="var(--q-text)">isWildcard?</text>

  <!-- yes branch right -->
  <line x1="480" y1="118" x2="560" y2="118" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrow-keep)"/>
  <text x="518" y="113" text-anchor="middle" font-size="10" fill="var(--yes)">yes</text>
  <rect x="560" y="100" width="90" height="36" rx="6" fill="var(--keep-fill)" stroke="var(--keep-border)" stroke-width="1"/>
  <text x="605" y="122" text-anchor="middle" font-weight="600" fill="var(--keep-text)">keep</text>
  <text x="605" y="148" text-anchor="middle" font-size="10" fill="var(--text2)">can't know what</text>
  <text x="605" y="160" text-anchor="middle" font-size="10" fill="var(--text2)">it brings in scope</text>

  <!-- no down -->
  <line x1="350" y1="136" x2="350" y2="156" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow-no)"/>
  <text x="358" y="150" font-size="10" fill="var(--no)">no</text>

  <!-- Q2: cfgAttribute -->
  <rect x="220" y="156" width="260" height="36" rx="6" fill="var(--q-fill)" stroke="var(--q-border)" stroke-width="1"/>
  <text x="350" y="178" text-anchor="middle" font-weight="600" fill="var(--q-text)">cfgAttribute?</text>

  <line x1="480" y1="174" x2="560" y2="174" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrow-keep)"/>
  <text x="518" y="169" text-anchor="middle" font-size="10" fill="var(--yes)">yes</text>
  <rect x="560" y="156" width="90" height="36" rx="6" fill="var(--keep-fill)" stroke="var(--keep-border)" stroke-width="1"/>
  <text x="605" y="178" text-anchor="middle" font-weight="600" fill="var(--keep-text)">keep</text>
  <text x="605" y="204" text-anchor="middle" font-size="10" fill="var(--text2)">conditional compile;</text>
  <text x="605" y="216" text-anchor="middle" font-size="10" fill="var(--text2)">can't analyze statically</text>

  <line x1="350" y1="192" x2="350" y2="212" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow-no)"/>
  <text x="358" y="206" font-size="10" fill="var(--no)">no</text>

  <!-- Q3: isGroup -->
  <rect x="220" y="212" width="260" height="36" rx="6" fill="var(--q-fill)" stroke="var(--q-border)" stroke-width="1"/>
  <text x="350" y="234" text-anchor="middle" font-weight="600" fill="var(--q-text)">isGroup?</text>

  <!-- yes: side branch with note -->
  <line x1="480" y1="230" x2="540" y2="230" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrow-keep)"/>
  <text x="508" y="225" text-anchor="middle" font-size="10" fill="var(--yes)">yes</text>
  <rect x="540" y="210" width="120" height="76" rx="6" fill="var(--side-fill)" stroke="var(--side-border)" stroke-width="1"/>
  <text x="600" y="232" text-anchor="middle" font-weight="600" fill="var(--text)">per-item filter</text>
  <text x="600" y="248" text-anchor="middle" font-size="10" fill="var(--text2)">each item checked</text>
  <text x="600" y="262" text-anchor="middle" font-size="10" fill="var(--text2)">independently</text>
  <text x="600" y="276" text-anchor="middle" font-size="10" fill="var(--text2)">drop if all removed</text>

  <line x1="350" y1="248" x2="350" y2="268" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow-no)"/>
  <text x="358" y="262" font-size="10" fill="var(--no)">no</text>

  <!-- Q4: has alias -->
  <rect x="220" y="268" width="260" height="36" rx="6" fill="var(--q-fill)" stroke="var(--q-border)" stroke-width="1"/>
  <text x="350" y="290" text-anchor="middle" font-weight="600" fill="var(--q-text)">has alias?</text>

  <line x1="480" y1="286" x2="540" y2="286" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrow-keep)"/>
  <text x="508" y="281" text-anchor="middle" font-size="10" fill="var(--yes)">yes</text>
  <rect x="540" y="266" width="120" height="56" rx="6" fill="var(--side-fill)" stroke="var(--side-border)" stroke-width="1"/>
  <text x="600" y="288" text-anchor="middle" font-weight="600" fill="var(--text)">check alias</text>
  <text x="600" y="304" text-anchor="middle" font-size="10" fill="var(--text2)">OR original name</text>

  <line x1="350" y1="304" x2="350" y2="324" stroke="#8b8fa8" stroke-width="1.5" marker-end="url(#arrow-no)"/>
  <text x="358" y="318" font-size="10" fill="var(--no)">no</text>

  <!-- Q5: simple item used -->
  <rect x="170" y="324" width="360" height="50" rx="6" fill="var(--q-fill)" stroke="var(--q-border)" stroke-width="1"/>
  <text x="350" y="344" text-anchor="middle" font-weight="600" fill="var(--q-text)">Simple item — used in code?</text>
  <text x="350" y="360" text-anchor="middle" font-size="10" fill="var(--q-text)">(bare identifier or implicit trait pattern)</text>

  <!-- keep / drop -->
  <line x1="260" y1="374" x2="170" y2="404" stroke="var(--yes)" stroke-width="1.5" marker-end="url(#arrow-keep)"/>
  <text x="200" y="396" font-size="10" fill="var(--yes)">yes</text>
  <rect x="90" y="404" width="120" height="36" rx="6" fill="var(--keep-fill)" stroke="var(--keep-border)" stroke-width="1"/>
  <text x="150" y="426" text-anchor="middle" font-weight="600" fill="var(--keep-text)">keep</text>

  <line x1="440" y1="374" x2="530" y2="404" stroke="var(--drop-border)" stroke-width="1.5" marker-end="url(#arrow-drop)"/>
  <text x="500" y="396" font-size="10" fill="var(--drop-border)">no</text>
  <rect x="490" y="404" width="120" height="36" rx="6" fill="var(--drop-fill)" stroke="var(--drop-border)" stroke-width="1"/>
  <text x="550" y="426" text-anchor="middle" font-weight="600" fill="var(--drop-text)">drop</text>

  <!-- Divider -->
  <line x1="50" y1="460" x2="650" y2="460" stroke="var(--border)" stroke-width="0.5"/>

  <!-- 4-pass explanation -->
  <text x="350" y="482" text-anchor="middle" font-weight="600" font-size="12" fill="var(--text)">The 4 passes that answer "used in code?"</text>

  <rect x="50" y="494" width="140" height="76" rx="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
  <text x="120" y="512" text-anchor="middle" font-weight="600" font-size="11" fill="var(--text)">1. bare identifiers</text>
  <text x="120" y="528" text-anchor="middle" font-size="10" fill="var(--text2)">strings, comments</text>
  <text x="120" y="542" text-anchor="middle" font-size="10" fill="var(--text2)">and char literals</text>
  <text x="120" y="556" text-anchor="middle" font-size="10" fill="var(--text2)">masked first</text>

  <rect x="205" y="494" width="140" height="76" rx="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
  <text x="275" y="512" text-anchor="middle" font-weight="600" font-size="11" fill="var(--text)">2. qualified-only</text>
  <text x="275" y="528" text-anchor="middle" font-size="10" fill="var(--text2)">Foo::Bar doesn't</text>
  <text x="275" y="542" text-anchor="middle" font-size="10" fill="var(--text2)">count as bare</text>
  <text x="275" y="556" text-anchor="middle" font-size="10" fill="var(--text2)">usage of Bar</text>

  <rect x="360" y="494" width="140" height="76" rx="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
  <text x="430" y="512" text-anchor="middle" font-weight="600" font-size="11" fill="var(--text)">3. decl stripping</text>
  <text x="430" y="528" text-anchor="middle" font-size="10" fill="var(--text2)">enum/struct bodies</text>
  <text x="430" y="542" text-anchor="middle" font-size="10" fill="var(--text2)">blanked so variant</text>
  <text x="430" y="556" text-anchor="middle" font-size="10" fill="var(--text2)">names don't count</text>

  <rect x="515" y="494" width="140" height="76" rx="5" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
  <text x="585" y="512" text-anchor="middle" font-weight="600" font-size="11" fill="var(--text)">4. implicit traits</text>
  <text x="585" y="528" text-anchor="middle" font-size="10" fill="var(--text2)">.get() → Row</text>
  <text x="585" y="542" text-anchor="middle" font-size="10" fill="var(--text2)">.read() → Read</text>
  <text x="585" y="556" text-anchor="middle" font-size="10" fill="var(--text2)">.context() → Context</text>
</svg>
