<svg xmlns="http://www.w3.org/2000/svg" width="700" viewBox="0 0 700 530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b8fa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      :root { --bg: #ffffff; --bg2: #f6f8fa; --border: #d0d7de; --text: #1f2328; --text2: #656d76; --purple-fill: #f3f0ff; --purple-border: #7c3aed; --purple-text: #4c1d95; --teal-fill: #f0fdf4; --teal-border: #059669; --teal-text: #064e3b; --coral-fill: #fff1ee; --coral-border: #e05c3a; --coral-text: #7c2d12; --gray-fill: #f6f8fa; --gray-border: #d0d7de; --comment-fill: #fffbeb; --comment-border: #d97706; --dash-color: #cbd5e1; }
      @media (prefers-color-scheme: dark) { :root { --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #e6edf3; --text2: #8b949e; --purple-fill: #1e1245; --purple-border: #a78bfa; --purple-text: #c4b5fd; --teal-fill: #022c22; --teal-border: #34d399; --teal-text: #6ee7b7; --coral-fill: #2d1208; --coral-border: #fb923c; --coral-text: #fdba74; --gray-fill: #161b22; --gray-border: #30363d; --comment-fill: #1c1a08; --comment-border: #ca8a04; --dash-color: #374151; } }
    </style>
  </defs>

  <rect width="700" height="530" fill="var(--bg)" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-weight="600" font-size="14" fill="var(--text)">Slot-based replacement — how non-import lines are preserved</text>

  <!-- Column headers -->
  <text x="175" y="56" text-anchor="middle" font-weight="600" font-size="12" fill="var(--text2)">Original file</text>
  <text x="525" y="56" text-anchor="middle" font-weight="600" font-size="12" fill="var(--text2)">After organizer</text>
  <line x1="50" y1="62" x2="330" y2="62" stroke="var(--border)" stroke-width="0.5"/>
  <line x1="370" y1="62" x2="650" y2="62" stroke="var(--border)" stroke-width="0.5"/>

  <!-- Row heights: 68px each, starting y=72 -->

  <!-- Line 0: use chrono (import slot, removed) -->
  <text x="42" y="101" text-anchor="end" font-size="11" fill="var(--text2)">0</text>
  <rect x="50" y="72" width="275" height="38" rx="5" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="187" y="95" text-anchor="middle" fill="var(--purple-text)" font-family="'Courier New', monospace" font-size="11">use chrono::{DateTime, Utc};</text>

  <rect x="375" y="72" width="275" height="38" rx="5" fill="var(--teal-fill)" stroke="var(--teal-border)" stroke-width="1"/>
  <text x="512" y="90" text-anchor="middle" fill="var(--teal-text)" font-family="'Courier New', monospace" font-size="11">use std::fs::File;</text>
  <text x="512" y="104" text-anchor="middle" font-size="10" fill="var(--teal-text)">↑ sorted to slot 0</text>
  <text x="422" y="101" text-anchor="end" font-size="11" fill="var(--text2)">0</text>

  <!-- Line 1: comment (verbatim copy) -->
  <text x="42" y="141" text-anchor="end" font-size="11" fill="var(--text2)">1</text>
  <rect x="50" y="120" width="275" height="38" rx="5" fill="var(--comment-fill)" stroke="var(--comment-border)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="187" y="143" text-anchor="middle" fill="var(--coral-text)" font-family="'Courier New', monospace" font-size="11">// legacy time helpers</text>

  <rect x="375" y="120" width="275" height="38" rx="5" fill="var(--comment-fill)" stroke="var(--comment-border)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="512" y="139" text-anchor="middle" fill="var(--coral-text)" font-family="'Courier New', monospace" font-size="11">// legacy time helpers</text>
  <text x="512" y="153" text-anchor="middle" font-size="10" fill="var(--text2)">verbatim copy — not a slot</text>
  <text x="422" y="141" text-anchor="end" font-size="11" fill="var(--text2)">1</text>

  <!-- Line 2: use serde_json (import slot, kept) -->
  <text x="42" y="181" text-anchor="end" font-size="11" fill="var(--text2)">2</text>
  <rect x="50" y="168" width="275" height="38" rx="5" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="187" y="191" text-anchor="middle" fill="var(--purple-text)" font-family="'Courier New', monospace" font-size="11">use serde_json::Value as JV;</text>

  <rect x="375" y="168" width="275" height="38" rx="5" fill="var(--teal-fill)" stroke="var(--teal-border)" stroke-width="1"/>
  <text x="512" y="186" text-anchor="middle" fill="var(--teal-text)" font-family="'Courier New', monospace" font-size="11">use serde_json::Value as JV;</text>
  <text x="512" y="200" text-anchor="middle" font-size="10" fill="var(--teal-text)">kept in slot 2</text>
  <text x="422" y="181" text-anchor="end" font-size="11" fill="var(--text2)">2</text>

  <!-- Line 3: blank (blank slot — absorbs group separator) -->
  <text x="42" y="231" text-anchor="end" font-size="11" fill="var(--text2)">3</text>
  <rect x="50" y="216" width="275" height="38" rx="5" fill="var(--gray-fill)" stroke="var(--dash-color)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="187" y="239" text-anchor="middle" fill="var(--text2)" font-size="11">(blank)</text>

  <rect x="375" y="216" width="275" height="38" rx="5" fill="var(--gray-fill)" stroke="var(--dash-color)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="512" y="234" text-anchor="middle" fill="var(--text2)" font-size="11">(blank — group separator)</text>
  <text x="512" y="248" text-anchor="middle" font-size="10" fill="var(--text2)">blank slot absorbs the separator</text>
  <text x="422" y="231" text-anchor="end" font-size="11" fill="var(--text2)">3</text>

  <!-- Line 4: use std::fs::File (import slot, moved to 0) -->
  <text x="42" y="277" text-anchor="end" font-size="11" fill="var(--text2)">4</text>
  <rect x="50" y="264" width="275" height="38" rx="5" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="187" y="287" text-anchor="middle" fill="var(--purple-text)" font-family="'Courier New', monospace" font-size="11">use std::fs::File;</text>

  <rect x="375" y="264" width="275" height="38" rx="5" fill="var(--coral-fill)" stroke="var(--coral-border)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="512" y="282" text-anchor="middle" fill="var(--coral-text)" font-size="11">chrono removed — slot becomes ""</text>
  <text x="512" y="296" text-anchor="middle" font-size="10" fill="var(--coral-text)">collapse pass cleans excess blanks</text>
  <text x="422" y="277" text-anchor="end" font-size="11" fill="var(--text2)">4</text>

  <!-- Line 5+: code body -->
  <text x="42" y="327" text-anchor="end" font-size="11" fill="var(--text2)">5+</text>
  <rect x="50" y="312" width="275" height="50" rx="5" fill="var(--gray-fill)" stroke="var(--border)" stroke-width="1"/>
  <text x="187" y="335" text-anchor="middle" fill="var(--text)" font-family="'Courier New', monospace" font-size="11">fn process(v: JV) {</text>
  <text x="187" y="353" text-anchor="middle" fill="var(--text)" font-family="'Courier New', monospace" font-size="11">  …</text>

  <rect x="375" y="312" width="275" height="50" rx="5" fill="var(--gray-fill)" stroke="var(--border)" stroke-width="1"/>
  <text x="512" y="335" text-anchor="middle" fill="var(--text)" font-family="'Courier New', monospace" font-size="11">fn process(v: JV) {</text>
  <text x="512" y="353" text-anchor="middle" fill="var(--text)" font-family="'Courier New', monospace" font-size="11">  …</text>
  <text x="422" y="327" text-anchor="end" font-size="11" fill="var(--text2)">5+</text>

  <!-- Arrows between columns -->
  <line x1="328" y1="91" x2="372" y2="91" stroke="#8b8fa8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="328" y1="139" x2="372" y2="139" stroke="#ca8a04" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="328" y1="187" x2="372" y2="187" stroke="#8b8fa8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="328" y1="235" x2="372" y2="235" stroke="#8b8fa8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="328" y1="283" x2="372" y2="283" stroke="#8b8fa8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="328" y1="337" x2="372" y2="337" stroke="#8b8fa8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text x="350" y="86" text-anchor="middle" font-size="10" fill="var(--teal-text)">sorted</text>
  <text x="350" y="134" text-anchor="middle" font-size="10" fill="var(--comment-border)">verbatim</text>
  <text x="350" y="182" text-anchor="middle" font-size="10" fill="var(--teal-text)">kept</text>
  <text x="350" y="230" text-anchor="middle" font-size="10" fill="var(--text2)">reused</text>
  <text x="350" y="278" text-anchor="middle" font-size="10" fill="var(--coral-border)">removed</text>
  <text x="350" y="332" text-anchor="middle" font-size="10" fill="var(--text2)">untouched</text>

  <!-- Summary / key insight -->
  <rect x="50" y="380" width="600" height="60" rx="6" fill="var(--bg2)" stroke="var(--border)" stroke-width="1"/>
  <text x="350" y="402" text-anchor="middle" font-weight="600" font-size="12" fill="var(--text)">Key insight</text>
  <text x="350" y="420" text-anchor="middle" font-size="11" fill="var(--text2)">Import slots (lines belonging to real use statements) and blank slots between them are the only</text>
  <text x="350" y="436" text-anchor="middle" font-size="11" fill="var(--text2)">lines replaced. Every other line — comments, blank lines, code — is copied verbatim.</text>

  <!-- Legend -->
  <rect x="50" y="460" width="12" height="12" rx="2" fill="var(--purple-fill)" stroke="var(--purple-border)" stroke-width="1"/>
  <text x="68" y="471" font-size="11" fill="var(--text2)">import slot</text>
  <rect x="165" y="460" width="12" height="12" rx="2" fill="var(--teal-fill)" stroke="var(--teal-border)" stroke-width="1"/>
  <text x="183" y="471" font-size="11" fill="var(--text2)">organized output</text>
  <rect x="310" y="460" width="12" height="12" rx="2" fill="var(--comment-fill)" stroke="var(--comment-border)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="328" y="471" font-size="11" fill="var(--text2)">verbatim copy</text>
  <rect x="450" y="460" width="12" height="12" rx="2" fill="var(--coral-fill)" stroke="var(--coral-border)" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="468" y="471" font-size="11" fill="var(--text2)">removed / empty</text>

  <!-- Source line annotations -->
  <text x="50" y="500" font-size="11" fill="var(--text2)">use slots: lines 0, 2, 4   ·   blank slot: line 3   ·   allSlots = [0, 2, 3, 4]   ·   organizedLines distributed in order across allSlots</text>
</svg>
